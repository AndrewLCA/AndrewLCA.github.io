<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research | Andrew Lu</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="research.css" />
</head>
<body class="subpage research-page">

  <nav class="subpage-nav">
    <a href="index.html" class="nav-logo">Andrew Lu</a>
    <div class="nav-links">
      <a href="aboutme.html">About</a>
      <a href="career.html">Career</a>
      <a href="research.html" class="active">Research</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="terminal-bg-grid"></div>
  <div class="research-circuit-base"></div>
  <div class="research-circuit"></div>

  <div class="research-signal-flow">
    <span class="signal-dot signal-1"></span>
    <span class="signal-dot signal-2"></span>
    <span class="signal-dot signal-3"></span>
    <span class="signal-dot signal-4"></span>
    <span class="signal-dot signal-5"></span>
    <span class="signal-dot signal-6"></span>
  </div>

  <div class="terminal-glow terminal-glow-1"></div>
  <div class="terminal-glow terminal-glow-2"></div>

  <main class="research-shell">

    <section class="terminal-window hero-terminal">
      <div class="terminal-bar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-title">andrew@research:~</span>
      </div>

      <div class="terminal-body">
        <div id="terminal-output">
          <p class="terminal-line">
            <span class="prompt">andrew@research:~$</span> ./open_research_profile.sh
          </p>
          <p class="terminal-output">Research profile loaded.</p>
          <p class="terminal-output">Type <span class="inline-code">help</span> to begin.</p>
        </div>

        <form id="terminal-form" class="terminal-input-row">
          <span class="prompt">andrew@research:~$</span>
          <input id="terminal-input" class="terminal-input" autofocus />
        </form>
      </div>
    </section>

    <section class="terminal-window main-terminal hidden-terminal" id="escal-terminal">
      <div class="terminal-bar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-title">andrew@research:~/ESCAL</span>
      </div>

      <div class="terminal-body">
        <div id="escal-output">
          <p class="terminal-output">Entered ESCAL directory.</p>
          <p class="terminal-output">Type <span class="inline-code">help</span>.</p>
        </div>

        <form id="escal-form" class="terminal-input-row">
          <span class="prompt">andrew@research:~/ESCAL$</span>
          <input id="escal-input" class="terminal-input" />
        </form>
      </div>
    </section>

    <template id="project-summary-template">
      <div class="research-block">
        <div class="terminal-card">
          <div class="card-row">
            <span class="card-label">Lab</span>
            <span class="card-value">
              <a href="https://www.escalab.org/" target="_blank" class="research-link">
                ESCAL Lab
              </a>
            </span>
          </div>
          <div class="card-row"><span class="card-label">Advisor</span><span class="card-value">Hung-Wei Tseng</span></div>
          <div class="card-row"><span class="card-label">Role</span><span class="card-value">Undergraduate Researcher</span></div>
          <div class="card-row"><span class="card-label">Dates</span><span class="card-value">Aug 2024 – Dec 2025</span></div>
        </div>
      </div>
    </template>

    <template id="methods-template">
      <div class="research-block">
        <div class="terminal-panel">
          <h2>Research</h2>
          <p>C++ hybrid sparse-dense matrix multiplication.</p>
          <ul>
            <li>Hybrid sparse-dense algorithm</li>
            <li>Tile-based optimization</li>
            <li>Benchmarks vs MKL + cuBLAS</li>
          </ul>
        </div>
      </div>
    </template>

    <template id="results-template">
      <div class="research-block">
        <div class="stats-grid">
          <div class="stat-card"><span class="stat-number">2.4×</span><span class="stat-text">MKL speedup</span></div>
          <div class="stat-card"><span class="stat-number">2.5×</span><span class="stat-text">cuBLAS speedup</span></div>
        </div>
      </div>
    </template>

  </main>

  <script>
    const terminalInput = document.getElementById("terminal-input");
    const terminalOutput = document.getElementById("terminal-output");
    const escalInput = document.getElementById("escal-input");
    const escalOutput = document.getElementById("escal-output");
    const escalTerminal = document.getElementById("escal-terminal");
    const terminalForm = document.getElementById("terminal-form");
    const escalForm = document.getElementById("escal-form");

    let currentDirectory = "~";

    let lastScrollY = window.scrollY;
    const nav = document.querySelector(".subpage-nav");

    window.addEventListener("scroll", () => {
      const currentScrollY = window.scrollY;

      if (currentScrollY > lastScrollY && currentScrollY > 80) {
        nav.classList.add("hide");
      } else {
        nav.classList.remove("hide");
      }

      lastScrollY = currentScrollY;
    });

    let history = [];
    let historyIndex = -1;

    function handleHistory(input, e) {
      if (e.key === "ArrowUp") {
        e.preventDefault();
        if (history.length > 0) {
          historyIndex = Math.max(0, historyIndex - 1);
          input.value = history[historyIndex] || "";
        }
      }

      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (history.length > 0) {
          historyIndex = Math.min(history.length, historyIndex + 1);
          input.value = history[historyIndex] || "";
        }
      }
    }

    function addTop(cmd) {
      terminalOutput.innerHTML += `<p class="terminal-line"><span class="prompt">andrew@research:~$</span> ${cmd}</p>`;
    }

    function addTopOut(txt) {
      terminalOutput.innerHTML += `<p class="terminal-output">${txt}</p>`;
    }

    function addEscal(cmd) {
      escalOutput.innerHTML += `<p class="terminal-line"><span class="prompt">andrew@research:~/ESCAL$</span> ${cmd}</p>`;
    }

    function addEscalOut(txt) {
      escalOutput.innerHTML += `<p class="terminal-output">${txt}</p>`;
    }

    function appendTemplate(id) {
      escalOutput.appendChild(
        document.getElementById(id).content.cloneNode(true)
      );
    }

    function scrollTopToBottom() {
      setTimeout(() => {
        terminalForm.scrollIntoView({ behavior: "smooth", block: "end" });
      }, 50);
    }

    function scrollEscalToBottom() {
      setTimeout(() => {
        escalForm.scrollIntoView({ behavior: "smooth", block: "end" });
      }, 50);
    }

    function autocompleteTop() {
      const value = terminalInput.value.trim().toLowerCase();

      if (value === "c" || value === "cd" || value === "cd ") {
        terminalInput.value = "cd ESCAL";
      } else if (value === "l" || value === "ls") {
        terminalInput.value = "ls";
      } else if (value === "p" || value === "pw" || value === "pwd") {
        terminalInput.value = "pwd";
      } else if (value === "h" || value === "he" || value === "hel" || value === "help") {
        terminalInput.value = "help";
      } else if (value === "cl" || value === "cle" || value === "clea" || value === "clear") {
        terminalInput.value = "clear";
      }
    }

    function autocompleteEscal() {
      const value = escalInput.value.trim().toLowerCase();

      if (value === "l" || value === "ls") {
        escalInput.value = "ls";
      } else if (value === "p" || value === "pw" || value === "pwd") {
        escalInput.value = "pwd";
      } else if (value === "h" || value === "he" || value === "hel" || value === "help") {
        escalInput.value = "help";
      } else if (value === "cl" || value === "cle" || value === "clea" || value === "clear") {
        escalInput.value = "clear";
      } else if (value === "cd" || value === "cd " || value === "cd ." || value === "cd ..") {
        escalInput.value = "cd ..";
      } else if ("cat project_summary.txt".startsWith(value)) {
        escalInput.value = "cat project_summary.txt";
      } else if ("cat methods.md".startsWith(value)) {
        escalInput.value = "cat methods.md";
      } else if ("cat results.log".startsWith(value)) {
        escalInput.value = "cat results.log";
      }
    }

    function runTop(cmd) {
      const c = cmd.trim().toLowerCase();

      if (c === "help") {
        addTopOut("ls, pwd, cd, clear, help");
      } else if (c === "ls") {
        addTopOut("ESCAL/");
      } else if (c === "pwd") {
        addTopOut("/home/andrew");
      } else if (c === "clear") {
        terminalOutput.innerHTML = "";
      } else if (c === "cd escal") {
        addTopOut("Entering ESCAL...");
        currentDirectory = "~/ESCAL";
        escalTerminal.classList.add("show-terminal");

        setTimeout(() => {
          escalTerminal.scrollIntoView({ behavior: "smooth", block: "start" });
          escalInput.focus();
        }, 180);
      } else if (c === "cd ..") {
        addTopOut("Already at top-level directory.");
      } else if (c.startsWith("cat ")) {
        addTopOut("cat: no such file in this directory");
      } else {
        addTopOut("Command not found");
      }

      scrollTopToBottom();
    }

    function runEscal(cmd) {
      const c = cmd.trim().toLowerCase();

      if (c === "help") {
        addEscalOut("ls, pwd, cat, clear, cd .., help");
      } else if (c === "ls") {
        addEscalOut("project_summary.txt methods.md results.log");
      } else if (c === "pwd") {
        addEscalOut("/home/andrew/ESCAL");
      } else if (c === "clear") {
        escalOutput.innerHTML = "";
      } else if (c === "cd ..") {
        addEscalOut("Leaving ESCAL...");
        currentDirectory = "~";
        escalTerminal.classList.remove("show-terminal");

        setTimeout(() => {
          terminalInput.focus();
        }, 180);
      } else if (c === "cat project_summary.txt") {
        appendTemplate("project-summary-template");
      } else if (c === "cat methods.md") {
        appendTemplate("methods-template");
      } else if (c === "cat results.log") {
        appendTemplate("results-template");
      } else if (c === "cd escal") {
        addEscalOut("Already in ESCAL.");
      } else {
        addEscalOut("Command not found");
      }

      scrollEscalToBottom();
    }

    terminalForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const cmd = terminalInput.value.trim();
      if (!cmd) return;

      history.push(cmd);
      historyIndex = history.length;

      addTop(cmd);
      runTop(cmd);
      terminalInput.value = "";
    });

    escalForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const cmd = escalInput.value.trim();
      if (!cmd) return;

      history.push(cmd);
      historyIndex = history.length;

      addEscal(cmd);
      runEscal(cmd);
      escalInput.value = "";
    });

    terminalInput.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        autocompleteTop();
        return;
      }
      handleHistory(terminalInput, e);
    });

    escalInput.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        autocompleteEscal();
        return;
      }
      handleHistory(escalInput, e);
    });

    document.addEventListener("click", () => {
      if (currentDirectory === "~/ESCAL" && escalTerminal.classList.contains("show-terminal")) {
        escalInput.focus();
      } else {
        terminalInput.focus();
      }
    });
  </script>

  <script src="scrollReveal.js"></script>
</body>
</html>
