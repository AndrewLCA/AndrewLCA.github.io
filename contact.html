  <div class="petal-layer" aria-hidden="true">
    <span class="petal petal-1"></span>

  <main class="contact-container">
    <section class="contact-panel">
      <p class="contact-kicker panel-reveal reveal-1">Contact</p>

      <div class="contact-grid">
        <a class="contact-card card-reveal card-1" href="mailto:andrewlu3002@gmail.com">

        <a class="contact-card card-reveal card-2" href="https://www.linkedin.com/in/andrewlca" target="_blank" rel="noopener noreferrer">

          <span class="contact-card-label">Discord</span>
          <span class="contact-card-value">andrewca.</span>

  </main>

  <script>
    let lastScrollY = window.scrollY;
    const nav = document.querySelector(".subpage-nav");

    window.addEventListener("scroll", () => {
      const currentScrollY = window.scrollY;

      if (currentScrollY > lastScrollY && currentScrollY > 80) {
        nav.classList.add("hide");
      } else {
        nav.classList.remove("hide");
      }

      lastScrollY = currentScrollY;
    });

    const cursorGlow = document.querySelector(".cursor-glow");
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = mouseX;
    let currentY = mouseY;

    function animateCursor() {
      currentX += (mouseX - currentX) * 0.18;
      currentY += (mouseY - currentY) * 0.18;

      cursorGlow.style.left = currentX + "px";
      cursorGlow.style.top = currentY + "px";

      requestAnimationFrame(animateCursor);
    }

    animateCursor();

    function spawnTrailPetal(x, y) {
      const petal = document.createElement("span");
      petal.className = "cursor-petal";

      const size = 6 + Math.random() * 8;
      const drift = (Math.random() - 0.5) * 36;
      const rotate = (Math.random() - 0.5) * 160;
      const duration = 700 + Math.random() * 500;

      petal.style.width = size + "px";
      petal.style.height = size * 0.68 + "px";
      petal.style.left = x + "px";
      petal.style.top = y + "px";
      petal.style.setProperty("--drift-x", drift + "px");
      petal.style.setProperty("--rotate-end", rotate + "deg");
      petal.style.animationDuration = duration + "ms";

      document.body.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, duration);
    }

    let lastPetalTime = 0;

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      const now = Date.now();
      if (now - lastPetalTime > 32) {
        spawnTrailPetal(e.clientX, e.clientY);
        lastPetalTime = now;
      }
    });

    window.addEventListener("mouseleave", () => {
      cursorGlow.classList.add("cursor-hidden");
    });

    window.addEventListener("mouseenter", () => {
      cursorGlow.classList.remove("cursor-hidden");
    });
  </script>
<div class="cursor-glow"></div>
<script src="cursor.js"></script>
</body>
</html>
