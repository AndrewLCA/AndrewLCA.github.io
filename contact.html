<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Andrew Lu</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body class="subpage contact-page">

  <nav class="subpage-nav">
    <a href="index.html" class="nav-logo">Andrew Lu</a>
    <div class="nav-links">
      <a href="aboutme.html">About</a>
      <a href="career.html">Career</a>
      <a href="research.html">Research</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <div class="contact-grid"></div>
  <div class="contact-circuit-base"></div>
  <div class="contact-circuit"></div>

  <div class="contact-signal-flow">
    <span class="signal-dot signal-1"></span>
    <span class="signal-dot signal-2"></span>
    <span class="signal-dot signal-3"></span>
    <span class="signal-dot signal-4"></span>
    <span class="signal-dot signal-5"></span>
    <span class="signal-dot signal-6"></span>
  </div>

  <div class="contact-glow glow-1"></div>
  <div class="contact-glow glow-2"></div>

  <main class="contact-shell">
    <section class="contact-panel">

      <div class="contact-header reveal reveal-1">
        <p class="contact-kicker">Contact Network</p>
       <!-- <h1>Let’s Connect</h1>
        <p class="contact-intro">
          Reach out for research, projects, opportunities, or just to say hi.
        </p> -->
      </div>

      <div class="contact-status-row reveal reveal-2">
        <div class="status-card">
          <span class="status-label">Status</span>
          <span class="status-value">
            <span class="status-dot"></span>
            Online
          </span>
        </div>

        <div class="status-card">
          <span class="status-label">Preferred Contact</span>
          <span class="status-value">Email / LinkedIn</span>
        </div>
      </div>

      <div class="contact-card-grid">
        <a class="contact-card reveal reveal-3" href="mailto:andrewlu3002@gmail.com">
          <span class="card-tag">Email</span>
          <!-- <h2>Email</h2> -->
          <p class="contact-value">andrewlu3002@gmail.com</p>
            <!-- <p class="card-note">Best for direct outreach and longer messages.</p> --> 
        </a>

        <a class="contact-card reveal reveal-4" href="https://www.linkedin.com/in/andrewlca" target="_blank" rel="noopener noreferrer">
          <span class="card-tag">LinkedIn</span>
          <!-- <h2>LinkedIn</h2> -->
          <p class="contact-value">linkedin.com/in/andrewlca</p>
          <!-- <p class="card-note">Professional background and networking.</p> -->
        </a>

        <a class="contact-card reveal reveal-5" href="https://github.com/AndrewLCA" target="_blank" rel="noopener noreferrer">
          <span class="card-tag">GitHub</span>
          <!-- <h2>GitHub</h2> --> 
          <p class="contact-value">github.com/AndrewLCA</p>
          <!-- <p class="card-note">Projects, code, and technical work.</p> --> 
        </a>

        <div class="contact-card static-card reveal reveal-6">
          <span class="card-tag">Discord</span>
          <!-- <h2>Discord</h2> --> 
          <p class="contact-value">andrewca.</p>
          <!-- <p class="card-note">Quick message channel.</p> --> 
        </div>
      </div>

    </section>
  </main>

  <script>
    let lastScrollY = window.scrollY;
    const nav = document.querySelector(".subpage-nav");

    window.addEventListener("scroll", () => {
      const currentScrollY = window.scrollY;

      if (currentScrollY > lastScrollY && currentScrollY > 80) {
        nav.classList.add("hide");
      } else {
        nav.classList.remove("hide");
      }

      lastScrollY = currentScrollY;
    });
  </script>

  <script src="scrollReveal.js"></script>
</body>
</html>
