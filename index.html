<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Lu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader">
    <div class="loader-wrap">
      <svg class="inner-ring" viewBox="0 0 200 200">
        <circle class="inner-seg s1" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s2" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s3" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s4" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s5" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s6" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s7" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s8" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s9" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s10" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s11" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s12" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s13" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s14" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s15" cx="100" cy="100" r="75"></circle>
        <circle class="inner-seg s16" cx="100" cy="100" r="75"></circle>
      </svg>

      <!-- OUTER RING -->
      <svg class="outer-ring" viewBox="0 0 200 200">
        <circle class="seg seg1" cx="100" cy="100" r="78"></circle>
        <circle class="seg seg2" cx="100" cy="100" r="78"></circle>
        <circle class="seg seg3" cx="100" cy="100" r="78"></circle>
        <circle class="seg seg4" cx="100" cy="100" r="78"></circle>
        <circle class="seg seg5" cx="100" cy="100" r="78"></circle>
      </svg>

    </div>
  </div>

  <div id="pageContent">
    <div class="menu">
      <a href="aboutme.html" class="btn">About Me</a>
      <a href="career.html" class="btn">Career</a>
      <a href="research.html" class="btn">Research</a>
      <a href="contact.html" class="btn">Contact</a>
    </div>
  </div>

 <script>
  function showPageInstantly() {
    const loader = document.getElementById("loader");
    const pageContent = document.getElementById("pageContent");

    loader.style.display = "none";
    pageContent.classList.add("show");
    document.body.classList.add("show-background");
  }

  function runLoader() {
    const loader = document.getElementById("loader");
    const pageContent = document.getElementById("pageContent");

    setTimeout(() => {
      loader.classList.add("finish");

      setTimeout(() => {
        loader.classList.add("hidden");
        pageContent.classList.add("show");
        document.body.classList.add("show-background");
      }, 800);
    }, 3000);
  }

  window.addEventListener("DOMContentLoaded", () => {
    const cameFromInternalNav = sessionStorage.getItem("skipHomeLoader") === "true";

    if (cameFromInternalNav) {
      sessionStorage.removeItem("skipHomeLoader");
      showPageInstantly();
    } else {
      runLoader();
    }

    document.querySelectorAll('#pageContent a').forEach(link => {
      link.addEventListener('click', () => {
        sessionStorage.setItem("skipHomeLoader", "true");
      });
    });
  });
</script>

</body>
</html>
